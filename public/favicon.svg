<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fe8c45"/>
      <stop offset="100%" style="stop-color:#ca2826"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Card suit spade shape -->
  <text x="32" y="40" font-size="32" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">♠</text>
  <!-- K letter -->
  <text x="13" y="22" font-size="16" fill="white" font-family="Arial" font-weight="900">K</text>
  <!-- Small suit bottom right -->
  <text x="48" y="58" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial">♠</text>
</svg>
